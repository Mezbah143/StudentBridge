services:
  - type: web
    name: studentbridge
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /StudentBridge/
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: studentbridge
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false

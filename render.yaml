services:
  - type: web
    name: StudentBridge
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: TRANSLATE_API_URL
        value: https://studentbridge-libretranslate.onrender.com/translate

  - type: web
    name: studentbridge-libretranslate
    runtime: image
    plan: free
    region: oregon
    image:
      url: docker.io/libretranslate/libretranslate:latest
    envVars:
      - key: PORT
        value: 5000
      - key: LT_HOST
        value: 0.0.0.0
      - key: LT_PORT
        value: 5000
      - key: LT_LOAD_ONLY
        value: en,ko,bn
      - key: LT_DISABLE_FILES_TRANSLATION
        value: "true"
      - key: LT_UPDATE_MODELS
        value: "true"

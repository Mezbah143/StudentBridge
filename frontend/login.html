<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your StudentBridge account.">
  <title data-i18n="title.login">Login | StudentBridge</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

    :root {
      --bg: #071226;
      --surface: #ffffff;
      --primary: #2f6df6;
      --primary-dark: #1f4ed8;
      --secondary: #22d3ee;
      --accent: #f8b84e;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe4f0;
      --shadow: 0 24px 70px rgba(2, 6, 23, 0.24);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 16%, rgba(34, 211, 238, 0.23), transparent 26%),
        radial-gradient(circle at 82% 10%, rgba(248, 184, 78, 0.18), transparent 24%),
        linear-gradient(135deg, #071226, #0d1b34 58%, #071226);
    }

    main {
      width: 100%;
      max-width: 420px;
    }

    .login-box {
      padding: 36px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .brand-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: var(--text);
      font-weight: 800;
      text-decoration: none;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 12px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
    }

    .login-box h1 {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 32px;
      line-height: 1.12;
      font-weight: 800;
      letter-spacing: 0;
    }

    .login-box > p {
      margin-bottom: 24px;
      color: var(--muted);
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 7px;
      color: #334155;
      font-size: 14px;
      font-weight: 700;
    }

    .input-group input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      color: var(--text);
      background: #f8fafc;
      font: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .input-group input:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(47, 109, 246, 0.14);
    }

    .form-message {
      display: none;
      margin-bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
    }

    .form-message.show {
      display: block;
    }

    .form-message.error {
      color: #b42318;
      background: #fff1f0;
    }

    .form-message.success,
    .form-message.info {
      color: var(--primary-dark);
      background: #eaf1ff;
    }

    .password-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .password-row input {
      flex: 1;
    }

    .toggle-password {
      min-width: 64px;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      color: var(--primary-dark);
      font-weight: 800;
      cursor: pointer;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .toggle-password:hover {
      border-color: var(--primary);
      box-shadow: 0 10px 22px rgba(47, 109, 246, 0.14);
    }

    .submit-btn {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), #65a8ff);
      box-shadow: 0 18px 40px rgba(47, 109, 246, 0.32);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 50px rgba(47, 109, 246, 0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 26px 0 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .social-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .social-btn {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .social-btn:hover {
      transform: translateY(-2px);
      border-color: #b8c7e3;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.1);
    }

    .social-btn i,
    .social-btn span {
      margin-right: 8px;
    }

    .social-btn.kakao span {
      display: inline-grid;
      width: 20px;
      height: 20px;
      place-items: center;
      border-radius: 6px;
      color: #3a1d1d;
      background: #fee500;
      font-size: 12px;
    }

    .switch {
      margin-top: 18px;
      color: var(--muted);
      text-align: center;
    }

    .switch a {
      color: var(--primary-dark);
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      body {
        padding: 18px;
      }

      .login-box {
        padding: 26px;
      }

      .social-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="login-box" aria-labelledby="login-title">
      <a class="brand-link" href="../index.html">
        <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-bridge"></i></span>
        <span>StudentBridge</span>
      </a>
      <div class="auth-language" data-language-switcher></div>

      <h1 id="login-title" data-i18n="login.heading">Welcome back</h1>
      <p data-i18n="login.body">Login to continue exploring student-friendly jobs.</p>

      <p class="form-message" id="loginMessage" role="status" aria-live="polite"></p>

      <form action="../LoginServlet" method="post" id="loginForm">
        <div class="input-group">
          <label for="email" data-i18n="login.email">Email address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" data-i18n-placeholder="login.emailPlaceholder" autocomplete="email" required>
        </div>

        <div class="input-group">
          <label for="password" data-i18n="login.password">Password</label>
          <div class="password-row">
            <input type="password" id="password" name="password" placeholder="Enter your password" data-i18n-placeholder="login.passwordPlaceholder" autocomplete="current-password" required>
            <button type="button" class="toggle-password" aria-label="Show password" data-i18n="common.show" data-i18n-aria-label="common.showPassword" aria-controls="password" aria-pressed="false">Show</button>
          </div>
        </div>

        <button type="submit" class="submit-btn" data-i18n="login.submit">Login</button>
      </form>

      <div class="divider"><span data-i18n="common.orContinueWith">or continue with</span></div>

      <div class="social-grid" aria-label="Social login options">
        <button type="button" class="social-btn" data-social-placeholder>
          <i class="fa-brands fa-google" aria-hidden="true"></i>
          Google
        </button>
        <button type="button" class="social-btn" data-social-placeholder>
          <i class="fa-brands fa-apple" aria-hidden="true"></i>
          Apple
        </button>
        <button type="button" class="social-btn kakao" data-social-placeholder>
          <span aria-hidden="true">K</span>
          Kakao
        </button>
        <button type="button" class="social-btn" data-social-placeholder>
          <i class="fa-brands fa-instagram" aria-hidden="true"></i>
          Instagram
        </button>
      </div>

      <p class="switch">
        <span data-i18n="login.noAccount">Do not have an account?</span> <a href="./register.html" data-i18n="login.registerLink">Register</a>
      </p>
    </section>
  </main>

  <script src="./runtime-config.js"></script>
  <script src="./platform.js"></script>
  <script src="./translations.js"></script>
  <script src="./i18n.js?v=20260609-navbar-fix"></script>
  <script>
    const loginMessage = document.getElementById("loginMessage");
    const loginForm = document.getElementById("loginForm");
    const togglePasswordButton = document.querySelector(".toggle-password");
    const passwordInput = document.getElementById("password");

    function showLoginMessage(message, type = "info") {
      loginMessage.textContent = window.StudentBridgeI18n ? StudentBridgeI18n.t(message) : message;
      loginMessage.className = `form-message show ${type}`;
    }

    const params = new URLSearchParams(window.location.search);

    const loginError = params.get("error");
    const loginErrorMessages = {
      "1": "login.invalid",
      empty: "login.empty",
      invalid: "login.invalid",
      database: "login.database",
      server: "login.server"
    };

    if (loginError === "loginRequired") {
      const loginSource = params.get("source");

      if (loginSource === "studentAddress") {
        showLoginMessage("login.studentAddressRequired", "error");
      } else {
        showLoginMessage("login.postJobRequired", "error");
      }
    } else if (loginErrorMessages[loginError]) {
      showLoginMessage(loginErrorMessages[loginError], "error");
    }

    if (params.get("registered") === "1") {
      showLoginMessage("login.registered", "success");
    }

    if (params.get("logout") === "1") {
      showLoginMessage("login.logout", "success");
    }

    if (window.StudentBridgePlatform && StudentBridgePlatform.canReachBackend()) {
      loginForm.action = StudentBridgePlatform.toBackendUrl("LoginServlet");
    }

    togglePasswordButton.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      const labelKey = isHidden ? "common.hide" : "common.show";
      const ariaKey = isHidden ? "common.hidePassword" : "common.showPassword";
      const label = window.StudentBridgeI18n ? StudentBridgeI18n.t(labelKey) : labelKey;
      const ariaLabel = window.StudentBridgeI18n ? StudentBridgeI18n.t(ariaKey) : ariaKey;

      togglePasswordButton.textContent = label;
      togglePasswordButton.setAttribute("aria-label", ariaLabel);
      togglePasswordButton.setAttribute("aria-pressed", String(isHidden));
    });

    loginForm.addEventListener("submit", (event) => {
      if (window.StudentBridgePlatform && StudentBridgePlatform.canReachBackend()) {
        return;
      }

      event.preventDefault();
      showLoginMessage("common.staticPreviewLogin", "info");
    });

    document.querySelectorAll("[data-social-placeholder]").forEach((button) => {
      button.addEventListener("click", () => {
        showLoginMessage("common.socialPlaceholder", "info");
      });
    });

    window.addEventListener("studentbridge:languagechange", () => {
      if (passwordInput.type === "password") {
        togglePasswordButton.textContent = StudentBridgeI18n.t("common.show");
        togglePasswordButton.setAttribute("aria-label", StudentBridgeI18n.t("common.showPassword"));
      } else {
        togglePasswordButton.textContent = StudentBridgeI18n.t("common.hide");
        togglePasswordButton.setAttribute("aria-label", StudentBridgeI18n.t("common.hidePassword"));
      }
    });
  </script>
</body>
</html>

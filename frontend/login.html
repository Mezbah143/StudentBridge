<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your StudentBridge account.">
  <title>Login | StudentBridge</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(to right, #1c412b, #6a1820);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 380px;
    }

    .login-box {
      background: #ffffff;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
    }

    .login-box h1 {
      margin-bottom: 10px;
      color: #111827;
      text-align: center;
      font-size: 28px;
    }

    .login-box p {
      margin-bottom: 20px;
      color: #4b5563;
      text-align: center;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      color: #374151;
      font-size: 14px;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 16px;
    }

    .password-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .password-row input {
      flex: 1;
    }

    .toggle-password {
      width: 44px;
      min-height: 44px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #f9fafb;
      color: #111827;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: #116605;
      color: #ffffff;
      border: 0;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: #0f5705;
    }

    .switch {
      margin-top: 15px;
      text-align: center;
    }

    .switch a {
      color: #2563eb;
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <section class="login-box" aria-labelledby="login-title">
      <h1 id="login-title">Welcome Back</h1>
      <p>Login to your StudentBridge account.</p>

      <form action="/LoginServlet" method="post">
        <div class="input-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            autocomplete="email"
            required
          >
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="password-row">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button
              type="button"
              class="toggle-password"
              aria-label="Show password"
              aria-controls="password"
              aria-pressed="false"
            >
              Show
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn">Login</button>
      </form>

      <p class="switch">
        Do not have an account? <a href="./register.html">Register</a>
      </p>
    </section>
  </main>

  <script>
    const togglePasswordButton = document.querySelector(".toggle-password");
    const passwordInput = document.getElementById("password");

    togglePasswordButton.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      togglePasswordButton.textContent = isHidden ? "Hide" : "Show";
      togglePasswordButton.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
      togglePasswordButton.setAttribute("aria-pressed", String(isHidden));
    });
  </script>
</body>
</html>

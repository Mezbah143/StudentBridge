<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a StudentBridge account as a student or employer.">
  <title>Register | StudentBridge</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./pages/register.css">
</head>
<body>
  <main class="container">
    <section class="auth-box" aria-labelledby="register-title">
      <a class="brand-link" href="../index.html">
        <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-bridge"></i></span>
        <span>StudentBridge</span>
      </a>

      <h1 id="register-title">Create your account</h1>
      <p>Join StudentBridge and start finding student-friendly opportunities.</p>

      <form action="/RegisterServlet" method="post">
        <div class="input-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" autocomplete="name" required>
        </div>

        <div class="input-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" required>
        </div>

        <div class="input-group">
          <label for="phone">Phone number</label>
          <input type="tel" id="phone" name="phone" placeholder="e.g. 010-1234-5678" autocomplete="tel" required>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Create password" autocomplete="new-password" required>
        </div>

        <div class="input-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" autocomplete="new-password" required>
        </div>

        <div class="input-group">
          <label for="accountType">Account type</label>
          <select id="accountType" name="accountType" required>
            <option value="">Select type</option>
            <option value="Student">Student</option>
            <option value="Employer">Employer</option>
          </select>
        </div>

        <div class="terms">
          <input type="checkbox" id="terms" name="terms" value="accepted" required>
          <label for="terms">I agree to the Terms and Conditions.</label>
        </div>

        <button type="submit" class="register-btn">Create Account</button>
      </form>

      <p class="switch">
        Already have an account? <a href="./login.html">Login</a>
      </p>
    </section>
  </main>
</body>
</html>

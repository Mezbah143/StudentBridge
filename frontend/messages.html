<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StudentBridge application messages between students and employers.">
  <title data-i18n="title.messages">Messages | StudentBridge</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="./post-job.css">
  <link rel="stylesheet" href="./notifications.css?v=20260609-notifications">
  <link rel="stylesheet" href="./messages.css?v=20260609-messages">
</head>
<body>
  <header class="navbar">
    <a class="logo" href="../index.html">
      <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-bridge"></i></span>
      <span>StudentBridge</span>
    </a>
    <nav class="nav-links" aria-label="Primary navigation" data-i18n-aria-label="nav.primary">
      <a href="../index.html" data-i18n="nav.home">Home</a>
      <a href="./jobsearch.html" data-i18n="nav.jobs">Jobs</a>
      <a href="./messages.html" aria-current="page" data-i18n="messages.label">Messages</a>
    </nav>
    <div data-language-switcher></div>
    <div data-message-root hidden></div>
    <div data-notification-root hidden></div>
  </header>

  <main>
    <section class="page-heading" aria-labelledby="messages-title">
      <p class="eyebrow"><i class="fa-solid fa-comments" aria-hidden="true"></i> <span data-i18n="messages.label">Messages</span></p>
      <h1 id="messages-title" data-i18n="messages.inboxTitle">Messages</h1>
      <p data-i18n="messages.inboxBody">Application conversations between students and employers.</p>
    </section>

    <section class="messages-page-shell" data-messages-page>
      <aside class="message-page-card" aria-labelledby="message-list-title">
        <div class="message-page-card-header">
          <h2 id="message-list-title" data-i18n="messages.label">Messages</h2>
          <p class="message-page-subtitle" data-i18n="messages.inboxBody">Application conversations between students and employers.</p>
        </div>
        <div class="message-page-list" data-message-page-list></div>
      </aside>

      <section class="message-page-card message-thread" aria-labelledby="active-message-title">
        <header class="message-thread-header">
          <h2 id="active-message-title" data-message-thread-title data-i18n="messages.chooseThread">Choose a conversation to start messaging.</h2>
          <p class="message-thread-meta" data-message-thread-meta></p>
        </header>

        <p class="message-status" data-message-page-status role="status" aria-live="polite"></p>
        <div class="message-thread-body" data-message-thread-body></div>

        <form class="message-compose" data-message-form>
          <label class="sr-only" for="messageBody" data-i18n="messages.writePlaceholder">Write a short message...</label>
          <textarea id="messageBody" name="body" maxlength="1000" required data-message-body data-i18n-placeholder="messages.writePlaceholder" placeholder="Write a short message..."></textarea>
          <button type="submit" class="message-send-button">
            <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
            <span data-i18n="messages.send">Send</span>
          </button>
        </form>
      </section>
    </section>
  </main>

  <script src="./runtime-config.js"></script>
  <script src="./platform.js"></script>
  <script src="./translations.js"></script>
  <script src="./i18n.js?v=20260609-navbar-fix"></script>
  <script src="./notifications.js?v=20260609-notifications"></script>
  <script src="./messages.js?v=20260609-messages"></script>
</body>
</html>

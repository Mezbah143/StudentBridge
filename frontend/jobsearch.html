<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StudentBridge Jobs</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
}

/* NAVBAR */
.navbar {
  background: white;
  padding: 15px 40px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  font-weight: bold;
  color: #2563eb;
}

/* SEARCH BAR */
.search-container {
  max-width: 1100px;
  margin: 25px auto;
  background: white;
  padding: 20px;
  border-radius: 15px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.search-container input,
.search-container select {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.search-container button {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* JOB GRID */
.jobs {
  max-width: 1100px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.job-card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  transition: 0.25s;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  position: relative;
}

.job-card:hover {
  transform: translateY(-6px);
}

/* SALARY */
.salary {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #dcfce7;
  color: #166534;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

/* TEXT */
.job-title { font-weight: bold; }
.company { color: #6b7280; }
.location { font-size: 13px; color: #9ca3af; }

/* TAGS */
.tag {
  display: inline-block;
  background: #e0e7ff;
  color: #3730a3;
  padding: 4px 8px;
  border-radius: 20px;
  font-size: 11px;
  margin: 3px;
}

/* DESC */
.desc {
  margin-top: 8px;
  font-size: 13px;
  color: #4b5563;
}

/* BUTTON */
.apply-btn {
  margin-top: 12px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #10b981;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">StudentBridge Jobs</div>

<!-- SEARCH -->
<div class="search-container">
  <input type="text" id="keyword" placeholder="Job title...">
  
  <select id="location">
    <option value="">All Locations</option>
    <option>Seoul</option>
    <option>Busan</option>
    <option>Ulsan</option>
    <option>Daegu</option>
  </select>

  <select id="category">
    <option value="">All Categories</option>
    <option>Student</option>
    <option>IT</option>
    <option>Design</option>
    <option>Marketing</option>
  </select>

  <select id="type">
    <option value="">All Types</option>
    <option>Part-time</option>
    <option>Full-time</option>
    <option>Internship</option>
  </select>

  <button onclick="searchJobs()">Search</button>
</div>

<div class="jobs" id="jobList"></div>

<script>
const jobs = [
  // STUDENT JOBS
  {id:1,title:"Cafe Assistant",company:"CoffeeDay",location:"Ulsan",category:"Student",type:"Part-time",salary:"₩10,000/hr",description:"Serve drinks and assist customers.",tags:["No Experience","Flexible","No Korean"]},
  {id:2,title:"Restaurant Server",company:"Seoul Kitchen",location:"Seoul",category:"Student",type:"Part-time",salary:"₩11,000/hr",description:"Take orders and serve food.",tags:["Flexible","Korean Required"]},
  {id:3,title:"English Tutor",company:"Bright Academy",location:"Busan",category:"Student",type:"Part-time",salary:"₩20,000/hr",description:"Teach English conversation.",tags:["High Pay","No Korean"]},
  {id:4,title:"Barista",company:"Cafe Aroma",location:"Daegu",category:"Student",type:"Part-time",salary:"₩10,500/hr",description:"Prepare coffee and assist customers.",tags:["Flexible"]},
  {id:5,title:"Store Staff",company:"GS25",location:"Ulsan",category:"Student",type:"Part-time",salary:"₩9,860/hr",description:"Handle cashier and stock.",tags:["Night Shift"]},

  // IT
  {id:6,title:"Frontend Developer",company:"TechCorp",location:"Seoul",category:"IT",type:"Full-time",salary:"₩25,000/hr",description:"Build UI apps.",tags:["High Pay"]},
  {id:7,title:"Backend Developer",company:"DevWorks",location:"Busan",category:"IT",type:"Full-time",salary:"₩30,000/hr",description:"Develop APIs.",tags:["High Pay"]},

  // DESIGN
  {id:8,title:"UI Designer",company:"Creative Studio",location:"Seoul",category:"Design",type:"Full-time",salary:"₩22,000/hr",description:"Design interfaces.",tags:[]},

  // MARKETING
  {id:9,title:"Marketing Intern",company:"MarketPro",location:"Seoul",category:"Marketing",type:"Internship",salary:"₩12,000/hr",description:"Assist campaigns.",tags:["Beginner Friendly"]}
];

function displayJobs(list) {
  const container = document.getElementById("jobList");
  container.innerHTML = "";

  if(list.length===0){
    container.innerHTML="<p>No jobs found</p>";
    return;
  }

  list.forEach(job=>{
    container.innerHTML += `
      <div class="job-card">
        <div class="salary">${job.salary}</div>
        <div class="job-title">${job.title}</div>
        <div class="company">${job.company}</div>
        <div class="location">${job.location}</div>

        ${job.tags.map(t=>`<span class="tag">${t}</span>`).join("")}

        <div class="desc">${job.description}</div>

        <button class="apply-btn" onclick="apply(${job.id})">Apply</button>
      </div>
    `;
  });
}

function searchJobs(){
  const k=document.getElementById("keyword").value.toLowerCase();
  const l=document.getElementById("location").value;
  const c=document.getElementById("category").value;
  const t=document.getElementById("type").value;

  const filtered = jobs.filter(j =>
    j.title.toLowerCase().includes(k) &&
    (l==="" || j.location===l) &&
    (c==="" || j.category===c) &&
    (t==="" || j.type===t)
  );

  displayJobs(filtered);
}

function apply(id){
  window.location.href=`apply.html?job_id=${id}`;
}

displayJobs(jobs);
</script>

</body>
</html>

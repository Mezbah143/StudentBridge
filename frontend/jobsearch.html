<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search student-friendly part-time jobs in Korea with StudentBridge.">
  <title>Jobs | StudentBridge</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #111827;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      background: #ffffff;
      padding: 15px 40px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
    }

    .logo {
      color: #2563eb;
      font-weight: 800;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 18px;
    }

    .nav-links a {
      color: #374151;
      text-decoration: none;
      font-weight: 600;
    }

    .nav-links a[aria-current="page"] {
      color: #2563eb;
    }

    main {
      padding: 28px 20px 48px;
    }

    .page-heading {
      max-width: 1100px;
      margin: 0 auto 20px;
    }

    .page-heading h1 {
      margin-bottom: 8px;
      font-size: 32px;
    }

    .page-heading p {
      color: #4b5563;
    }

    .search-container {
      max-width: 1100px;
      margin: 0 auto 25px;
      background: #ffffff;
      padding: 20px;
      border-radius: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    .form-field label {
      display: block;
      margin-bottom: 6px;
      color: #374151;
      font-size: 14px;
      font-weight: 700;
    }

    .form-field input,
    .form-field select {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
    }

    .search-container button {
      align-self: end;
      min-height: 47px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #ffffff;
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .jobs {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .job-card {
      position: relative;
      background: #ffffff;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
    }

    .salary {
      display: inline-block;
      margin-bottom: 12px;
      background: #dcfce7;
      color: #166534;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }

    .job-title {
      margin-bottom: 4px;
      font-size: 20px;
    }

    .company {
      color: #6b7280;
      font-weight: 600;
    }

    .location {
      margin-top: 4px;
      color: #4b5563;
      font-size: 14px;
    }

    .tags {
      margin-top: 10px;
    }

    .tag {
      display: inline-block;
      background: #e0e7ff;
      color: #3730a3;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      margin: 3px 3px 3px 0;
    }

    .desc {
      margin-top: 10px;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.5;
    }

    .apply-btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border: 0;
      border-radius: 10px;
      background: #10b981;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
    }

    .empty-state {
      max-width: 1100px;
      margin: 0 auto;
      color: #4b5563;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="navbar">
    <a class="logo" href="../index.html">StudentBridge</a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="../index.html">Home</a>
      <a href="./jobsearch.html" aria-current="page">Jobs</a>
      <a href="./login.html">Login</a>
      <a href="./register.html">Register</a>
    </nav>
  </header>

  <main>
    <section class="page-heading" aria-labelledby="jobs-title">
      <h1 id="jobs-title">Find Jobs</h1>
      <p>Search student-friendly jobs by keyword, location, category, and type.</p>
    </section>

    <form class="search-container" id="jobSearchForm" role="search">
      <div class="form-field">
        <label for="keyword">Job title</label>
        <input type="search" id="keyword" name="keyword" placeholder="Cafe Assistant">
      </div>

      <div class="form-field">
        <label for="location">Location</label>
        <select id="location" name="location">
          <option value="">All Locations</option>
          <option value="Seoul">Seoul</option>
          <option value="Busan">Busan</option>
          <option value="Ulsan">Ulsan</option>
          <option value="Daegu">Daegu</option>
        </select>
      </div>

      <div class="form-field">
        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="">All Categories</option>
          <option value="Student">Student</option>
          <option value="IT">IT</option>
          <option value="Design">Design</option>
          <option value="Marketing">Marketing</option>
        </select>
      </div>

      <div class="form-field">
        <label for="type">Job type</label>
        <select id="type" name="type">
          <option value="">All Types</option>
          <option value="Part-time">Part-time</option>
          <option value="Full-time">Full-time</option>
          <option value="Internship">Internship</option>
        </select>
      </div>

      <button type="submit">Search</button>
    </form>

    <section class="jobs" id="jobList" aria-live="polite" aria-label="Job listings"></section>
  </main>

  <script>
    const jobs = [
      { id: 1, title: "Cafe Assistant", company: "CoffeeDay", location: "Ulsan", category: "Student", type: "Part-time", salary: "₩10,000/hr", description: "Serve drinks and assist customers.", tags: ["No Experience", "Flexible", "No Korean"] },
      { id: 2, title: "Restaurant Server", company: "Seoul Kitchen", location: "Seoul", category: "Student", type: "Part-time", salary: "₩11,000/hr", description: "Take orders and serve food.", tags: ["Flexible", "Korean Required"] },
      { id: 3, title: "English Tutor", company: "Bright Academy", location: "Busan", category: "Student", type: "Part-time", salary: "₩20,000/hr", description: "Teach English conversation.", tags: ["High Pay", "No Korean"] },
      { id: 4, title: "Barista", company: "Cafe Aroma", location: "Daegu", category: "Student", type: "Part-time", salary: "₩10,500/hr", description: "Prepare coffee and assist customers.", tags: ["Flexible"] },
      { id: 5, title: "Store Staff", company: "GS25", location: "Ulsan", category: "Student", type: "Part-time", salary: "₩9,860/hr", description: "Handle cashier and stock.", tags: ["Night Shift"] },
      { id: 6, title: "Frontend Developer", company: "TechCorp", location: "Seoul", category: "IT", type: "Full-time", salary: "₩25,000/hr", description: "Build UI apps.", tags: ["High Pay"] },
      { id: 7, title: "Backend Developer", company: "DevWorks", location: "Busan", category: "IT", type: "Full-time", salary: "₩30,000/hr", description: "Develop APIs.", tags: ["High Pay"] },
      { id: 8, title: "UI Designer", company: "Creative Studio", location: "Seoul", category: "Design", type: "Full-time", salary: "₩22,000/hr", description: "Design interfaces.", tags: [] },
      { id: 9, title: "Marketing Intern", company: "MarketPro", location: "Seoul", category: "Marketing", type: "Internship", salary: "₩12,000/hr", description: "Assist campaigns.", tags: ["Beginner Friendly"] }
    ];

    const jobList = document.getElementById("jobList");
    const jobSearchForm = document.getElementById("jobSearchForm");

    function displayJobs(list) {
      jobList.innerHTML = "";

      if (list.length === 0) {
        jobList.innerHTML = '<p class="empty-state">No jobs found. Try a different search.</p>';
        return;
      }

      const fragment = document.createDocumentFragment();

      list.forEach((job) => {
        const article = document.createElement("article");
        article.className = "job-card";

        article.innerHTML = `
          <p class="salary">${job.salary}</p>
          <h2 class="job-title">${job.title}</h2>
          <p class="company">${job.company}</p>
          <p class="location">${job.location} · ${job.type}</p>
          <div class="tags" aria-label="Job tags">
            ${job.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
          <p class="desc">${job.description}</p>
          <button type="button" class="apply-btn" data-job-id="${job.id}">Apply</button>
        `;

        fragment.appendChild(article);
      });

      jobList.appendChild(fragment);
    }

    function filterJobs() {
      const keyword = document.getElementById("keyword").value.trim().toLowerCase();
      const location = document.getElementById("location").value;
      const category = document.getElementById("category").value;
      const type = document.getElementById("type").value;

      const filtered = jobs.filter((job) =>
        job.title.toLowerCase().includes(keyword) &&
        (location === "" || job.location === location) &&
        (category === "" || job.category === category) &&
        (type === "" || job.type === type)
      );

      displayJobs(filtered);
    }

    jobSearchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      filterJobs();
    });

    jobList.addEventListener("click", (event) => {
      const applyButton = event.target.closest(".apply-btn");

      if (!applyButton) {
        return;
      }

      const jobId = applyButton.dataset.jobId;
      alert(`Application flow is not connected yet. Selected job ID: ${jobId}`);
    });

    displayJobs(jobs);
  </script>
</body>
</html>

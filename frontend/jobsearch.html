<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search student-friendly part-time jobs in Korea with StudentBridge.">
  <title>Jobs | StudentBridge</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

    :root {
      --bg: #071226;
      --bg-soft: #0d1b34;
      --surface: #ffffff;
      --surface-soft: #f6f8fc;
      --primary: #2f6df6;
      --primary-dark: #1f4ed8;
      --secondary: #22d3ee;
      --accent: #f8b84e;
      --text: #0f172a;
      --muted: #64748b;
      --line: #dbe4f0;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
      background:
        radial-gradient(circle at 82% 0%, rgba(34, 211, 238, 0.16), transparent 25%),
        linear-gradient(180deg, #071226 0, #071226 290px, var(--surface-soft) 290px);
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px clamp(20px, 5vw, 72px);
      color: #ffffff;
      background: rgba(7, 18, 38, 0.9);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-weight: 800;
      text-decoration: none;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
    }

    .nav-links a {
      padding: 9px 14px;
      border-radius: 999px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      color: #ffffff;
      background: rgba(47, 109, 246, 0.24);
    }

    main {
      padding: 48px clamp(20px, 5vw, 72px) 64px;
    }

    .page-heading {
      max-width: 1120px;
      margin: 0 auto 24px;
      color: #ffffff;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      color: #bfdbfe;
      background: rgba(255, 255, 255, 0.07);
      font-size: 14px;
      font-weight: 800;
    }

    .page-heading h1 {
      max-width: 760px;
      margin-bottom: 12px;
      font-size: clamp(38px, 5vw, 62px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0;
    }

    .page-heading p {
      max-width: 620px;
      color: #cbd5e1;
      font-size: 18px;
    }

    .search-container {
      max-width: 1120px;
      margin: 34px auto 28px;
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr)) auto;
      gap: 12px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 70px rgba(2, 6, 23, 0.18);
    }

    .form-field label {
      display: block;
      margin-bottom: 7px;
      color: #334155;
      font-size: 13px;
      font-weight: 800;
    }

    .form-field input,
    .form-field select {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      color: var(--text);
      background: #f8fafc;
      font: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(47, 109, 246, 0.14);
    }

    .search-container button {
      align-self: end;
      min-height: 48px;
      padding: 0 22px;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--primary), #65a8ff);
      box-shadow: 0 16px 36px rgba(47, 109, 246, 0.3);
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .search-container button:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 46px rgba(47, 109, 246, 0.38);
    }

    .jobs {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .job-card {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .job-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 24px 55px rgba(15, 23, 42, 0.16);
    }

    .salary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
      padding: 7px 10px;
      border-radius: 999px;
      color: #0f766e;
      background: #ccfbf1;
      font-size: 13px;
      font-weight: 800;
    }

    .job-title {
      margin-bottom: 5px;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 800;
    }

    .company {
      color: var(--muted);
      font-weight: 700;
    }

    .location {
      margin-top: 8px;
      color: #334155;
      font-size: 14px;
      font-weight: 600;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .tag {
      display: inline-block;
      padding: 6px 9px;
      border-radius: 999px;
      color: #1e40af;
      background: #eaf1ff;
      font-size: 12px;
      font-weight: 800;
    }

    .desc {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .apply-btn {
      width: 100%;
      min-height: 46px;
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      color: #ffffff;
      background: #0f172a;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .apply-btn:hover {
      transform: translateY(-2px);
      background: var(--primary);
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 22px;
      color: var(--muted);
      background: #ffffff;
      text-align: center;
      font-weight: 700;
    }

    @media (max-width: 980px) {
      .search-container {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .search-container button {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 680px) {
      .navbar {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-links {
        justify-content: center;
      }

      .search-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <a class="logo" href="../index.html">
      <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-bridge"></i></span>
      <span>StudentBridge</span>
    </a>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="../index.html">Home</a>
      <a href="./jobsearch.html" aria-current="page">Jobs</a>
      <a href="./login.html">Login</a>
      <a href="./register.html">Register</a>
    </nav>
  </header>

  <main>
    <section class="page-heading" aria-labelledby="jobs-title">
      <p class="eyebrow"><i class="fa-solid fa-briefcase" aria-hidden="true"></i> Student-friendly job board</p>
      <h1 id="jobs-title">Explore jobs that fit your student life</h1>
      <p>Search by role, location, category, or schedule to find opportunities across Korea.</p>
    </section>

    <form class="search-container" id="jobSearchForm" role="search">
      <div class="form-field">
        <label for="keyword">Job title</label>
        <input type="search" id="keyword" name="keyword" placeholder="Cafe Assistant">
      </div>

      <div class="form-field">
        <label for="location">Location</label>
        <select id="location" name="location">
          <option value="">All Locations</option>
          <option value="Seoul">Seoul</option>
          <option value="Busan">Busan</option>
          <option value="Ulsan">Ulsan</option>
          <option value="Daegu">Daegu</option>
        </select>
      </div>

      <div class="form-field">
        <label for="category">Category</label>
        <select id="category" name="category">
          <option value="">All Categories</option>
          <option value="Student">Student</option>
          <option value="IT">IT</option>
          <option value="Design">Design</option>
          <option value="Marketing">Marketing</option>
        </select>
      </div>

      <div class="form-field">
        <label for="type">Job type</label>
        <select id="type" name="type">
          <option value="">All Types</option>
          <option value="Part-time">Part-time</option>
          <option value="Full-time">Full-time</option>
          <option value="Internship">Internship</option>
        </select>
      </div>

      <button type="submit"><i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i> Search</button>
    </form>

    <section class="jobs" id="jobList" aria-live="polite" aria-label="Job listings"></section>
  </main>

  <script>
    const jobs = [
      { id: 1, title: "Cafe Assistant", company: "CoffeeDay", location: "Ulsan", category: "Student", type: "Part-time", salary: "₩10,000/hr", description: "Serve drinks and assist customers.", tags: ["No Experience", "Flexible", "No Korean"] },
      { id: 2, title: "Restaurant Server", company: "Seoul Kitchen", location: "Seoul", category: "Student", type: "Part-time", salary: "₩11,000/hr", description: "Take orders and serve food.", tags: ["Flexible", "Korean Required"] },
      { id: 3, title: "English Tutor", company: "Bright Academy", location: "Busan", category: "Student", type: "Part-time", salary: "₩20,000/hr", description: "Teach English conversation.", tags: ["High Pay", "No Korean"] },
      { id: 4, title: "Barista", company: "Cafe Aroma", location: "Daegu", category: "Student", type: "Part-time", salary: "₩10,500/hr", description: "Prepare coffee and assist customers.", tags: ["Flexible"] },
      { id: 5, title: "Store Staff", company: "GS25", location: "Ulsan", category: "Student", type: "Part-time", salary: "₩9,860/hr", description: "Handle cashier and stock.", tags: ["Night Shift"] },
      { id: 6, title: "Frontend Developer", company: "TechCorp", location: "Seoul", category: "IT", type: "Full-time", salary: "₩25,000/hr", description: "Build UI apps.", tags: ["High Pay"] },
      { id: 7, title: "Backend Developer", company: "DevWorks", location: "Busan", category: "IT", type: "Full-time", salary: "₩30,000/hr", description: "Develop APIs.", tags: ["High Pay"] },
      { id: 8, title: "UI Designer", company: "Creative Studio", location: "Seoul", category: "Design", type: "Full-time", salary: "₩22,000/hr", description: "Design interfaces.", tags: [] },
      { id: 9, title: "Marketing Intern", company: "MarketPro", location: "Seoul", category: "Marketing", type: "Internship", salary: "₩12,000/hr", description: "Assist campaigns.", tags: ["Beginner Friendly"] }
    ];

    const jobList = document.getElementById("jobList");
    const jobSearchForm = document.getElementById("jobSearchForm");

    function displayJobs(list) {
      jobList.innerHTML = "";

      if (list.length === 0) {
        jobList.innerHTML = '<p class="empty-state">No jobs found. Try a different search.</p>';
        return;
      }

      const fragment = document.createDocumentFragment();

      list.forEach((job) => {
        const article = document.createElement("article");
        article.className = "job-card";

        article.innerHTML = `
          <p class="salary"><i class="fa-solid fa-won-sign" aria-hidden="true"></i>${job.salary}</p>
          <h2 class="job-title">${job.title}</h2>
          <p class="company">${job.company}</p>
          <p class="location"><i class="fa-solid fa-location-dot" aria-hidden="true"></i> ${job.location} · ${job.type}</p>
          <div class="tags" aria-label="Job tags">
            ${job.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}
          </div>
          <p class="desc">${job.description}</p>
          <button type="button" class="apply-btn" data-job-id="${job.id}">Apply Now</button>
        `;

        fragment.appendChild(article);
      });

      jobList.appendChild(fragment);
    }

    function filterJobs() {
      const keyword = document.getElementById("keyword").value.trim().toLowerCase();
      const location = document.getElementById("location").value;
      const category = document.getElementById("category").value;
      const type = document.getElementById("type").value;

      const filtered = jobs.filter((job) =>
        job.title.toLowerCase().includes(keyword) &&
        (location === "" || job.location === location) &&
        (category === "" || job.category === category) &&
        (type === "" || job.type === type)
      );

      displayJobs(filtered);
    }

    jobSearchForm.addEventListener("submit", (event) => {
      event.preventDefault();
      filterJobs();
    });

    jobList.addEventListener("click", (event) => {
      const applyButton = event.target.closest(".apply-btn");

      if (!applyButton) {
        return;
      }

      const jobId = applyButton.dataset.jobId;
      alert(`Application flow is not connected yet. Selected job ID: ${jobId}`);
    });

    displayJobs(jobs);
  </script>
</body>
</html>

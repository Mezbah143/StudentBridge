<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - StudentBridge</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">🎓 StudentBridge</div>

  <div>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<!-- DASHBOARD -->
<section style="padding: 40px;">

  <h1 id="welcome"></h1>
  <p id="roleText"></p>

  <!-- EMPLOYER ACTION -->
  <div id="employerSection" style="display:none; margin-top:20px;">
    <h2>Employer Panel</h2>
    <button onclick="openPostJob()">Post a Job</button>
  </div>

  <!-- STUDENT ACTION -->
  <div id="studentSection" style="display:none; margin-top:20px;">
    <h2>Available Jobs</h2>
    <div id="jobs" class="jobs-container"></div>
  </div>

</section>

<!-- POST JOB MODAL -->
<div id="jobModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('jobModal')">&times;</span>

    <h2>Post a Job</h2>

    <input type="text" id="jobTitle" placeholder="Job Title">
    <input type="text" id="jobCity" placeholder="City">
    <textarea id="jobDesc" placeholder="Job Description"></textarea>

    <button onclick="postJob()">Post Job</button>
  </div>
</div>

<script>

// ================= LOAD USER =================
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "/";
}

// Show user info
document.getElementById("welcome").innerText = `Welcome, ${user.email}`;
document.getElementById("roleText").innerText = `Role: ${user.role}`;

// Show role-based UI
if (user.role === "employer") {
  document.getElementById("employerSection").style.display = "block";
} else {
  document.getElementById("studentSection").style.display = "block";
  loadJobs();
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("user");
  window.location.href = "/";
}

// ================= MODAL =================
function openPostJob() {
  document.getElementById("jobModal").style.display = "block";
}

function closeModal(id) {
  document.getElementById(id).style.display = "none";
}

// ================= POST JOB =================
async function postJob() {
  const title = document.getElementById("jobTitle").value;
  const city = document.getElementById("jobCity").value;
  const description = document.getElementById("jobDesc").value;

  const res = await fetch("http://localhost:3000/api/jobs/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ title, city, description })
  });

  const data = await res.json();
  alert(data.message);

  closeModal("jobModal");
}

// ================= LOAD JOBS =================
async function loadJobs() {
  const res = await fetch("http://localhost:3000/api/jobs");
  const jobs = await res.json();

  const container = document.getElementById("jobs");
  container.innerHTML = "";

  jobs.forEach(job => {
    container.innerHTML += `
      <div class="job-card">
        <h3>${job.title}</h3>
        <p><strong>City:</strong> ${job.city}</p>
        <p>${job.description}</p>
        <button onclick="applyJob()">Apply</button>
      </div>
    `;
  });
}

// ================= APPLY =================
function applyJob() {
  alert("Applied successfully! (Next: connect application system)");
}

</script>

</body>
</html>
